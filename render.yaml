services:
  # Monolithic Full-Stack Web Service
  - type: web
    name: mediconnect-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build && cd ../backend && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production

databases:
  - name: mediconnect-db
    plan: free
